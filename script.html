<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ScriptGalaxy</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#020617;
color:white;
overflow-x:hidden;
}

/* ===== Animated Background ===== */

#particles{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;

}

/* glow gradient */

body::before{

content:"";

position:fixed;

width:100%;
height:100%;

background:
radial-gradient(circle at 20% 20%, rgba(0,150,255,0.25), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(0,80,255,0.2), transparent 40%);

filter:blur(80px);

animation:bgMove 20s ease-in-out infinite alternate;

z-index:-2;

}

@keyframes bgMove{

from{transform:scale(1)}
to{transform:scale(1.3)}

}

/* ===== Header ===== */

header{

display:flex;
justify-content:space-between;
align-items:center;

padding:20px 40px;

background:rgba(0,0,0,0.7);

backdrop-filter:blur(10px);

border-bottom:1px solid #0ea5e9;

}

.logo{

font-size:22px;
font-weight:bold;

color:#38bdf8;

text-shadow:0 0 10px #38bdf8;

}

#search{

padding:10px;

border-radius:6px;

border:none;

width:220px;

}

/* ===== Layout ===== */

.main{

display:flex;

min-height:90vh;

}

/* sidebar */

.sidebar{

width:200px;

background:rgba(0,0,0,0.6);

padding:20px;

border-right:1px solid #0ea5e9;

}

.sidebar h3{
margin-bottom:15px;
}

.sidebar li{

list-style:none;

padding:10px;

border-radius:6px;

cursor:pointer;

transition:.2s;

}

.sidebar li:hover{

background:#0f172a;

}

/* content */

.content{

flex:1;

padding:30px;

}

.grid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(300px,1fr));

gap:25px;

margin-top:20px;

}

/* ===== Script Card ===== */

.card{

background:#020617;

border-radius:12px;

overflow:hidden;

border:1px solid rgba(56,189,248,0.2);

transition:.3s;

}

.card:hover{

transform:translateY(-8px);

box-shadow:0 0 20px rgba(56,189,248,0.4);

}

.card img{

width:100%;
height:180px;

object-fit:cover;

}

.card-body{

padding:15px;

}

.card-body h3{

margin-bottom:10px;

color:#38bdf8;

}

textarea{

width:100%;

height:70px;

background:#020617;

border:1px solid #0ea5e9;

color:#38bdf8;

padding:10px;

border-radius:6px;

resize:none;

}

/* buttons */

.buttons{

display:flex;

gap:8px;

margin-top:10px;

}

button{

flex:1;

padding:9px;

border:none;

border-radius:6px;

background:#0369a1;

color:white;

cursor:pointer;

transition:.2s;

}

button:hover{

background:#0ea5e9;

}

/* ad section */

.ad{

margin-top:40px;

padding:40px;

text-align:center;

background:#020617;

border-radius:10px;

border:1px solid #0ea5e9;

}

/* footer */

footer{

text-align:center;

padding:20px;

margin-top:40px;

background:#020617;

border-top:1px solid #0ea5e9;

}

/* mobile */

@media(max-width:750px){

.main{
flex-direction:column;
}

.sidebar{
width:100%;
border-right:none;
border-bottom:1px solid #0ea5e9;
}

}

</style>

</head>

<body>

<canvas id="particles"></canvas>

<header>

<div class="logo">ScriptGalaxy</div>

<input id="search" placeholder="Search script...">

</header>

<div class="main">

<aside class="sidebar">

<h3>Categories</h3>

<ul>

<li>All Scripts</li>
<li>Auto Farm</li>
<li>ESP</li>
<li>Misc</li>

</ul>

</aside>

<section class="content">

<h2>🔥 Trending Scripts</h2>

<div class="grid">

<div class="card">

<img src="https://tr.rbxcdn.com/7b2c9c0bba8b4c728c59c1e06c2e2d42/768/432/Image/Png">

<div class="card-body">

<h3>Blox Fruits Auto Farm</h3>

<textarea id="script1">loadstring(game:HttpGet("https://example.com/script1"))()</textarea>

<div class="buttons">

<button onclick="copyScript('script1')">Copy</button>

<button onclick="downloadScript('script1')">Download</button>

<button onclick="window.open('https://rekonise.com')">Get Link</button>

</div>

</div>

</div>

</div>

<div class="ad">

PUT YOUR ADSTERRA / POPADS CODE HERE

</div>

</section>

</div>

<footer>

ScriptGalaxy © 2026

</footer>

<script>

/* Copy */

function copyScript(id){

let text=document.getElementById(id).value

navigator.clipboard.writeText(text)

alert("Copied!")

}

/* Download */

function downloadScript(id){

let text=document.getElementById(id).value

let blob=new Blob([text],{type:"text/plain"})

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="script.txt"

a.click()

}

/* Animated particles background */

const canvas=document.getElementById("particles")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let particles=[]

for(let i=0;i<120;i++){

particles.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2,
speed:Math.random()*0.5

})

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="#38bdf8"

particles.forEach(p=>{

p.y+=p.speed

if(p.y>canvas.height) p.y=0

ctx.fillRect(p.x,p.y,p.size,p.size)

})

requestAnimationFrame(animate)

}

animate()

</script>

</body>
</html>
