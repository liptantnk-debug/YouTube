<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Processing</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
background:#020617;
color:white;
}

.box{
text-align:center;
width:300px;
}

.loader{
width:70px;
height:70px;
border-radius:50%;
border:6px solid #1e293b;
border-top:6px solid #3b82f6;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}

.progress{
height:8px;
background:#1e293b;
border-radius:10px;
margin-top:30px;
overflow:hidden;
}

.bar{
height:100%;
width:0%;
background:#3b82f6;
transition:width 1s;
}

</style>
</head>

<body>

<div class="box">

<div class="loader"></div>

<p id="text">Preparing link...</p>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

</div>

<script>

if(sessionStorage.getItem("gate")!="1"){
location="index.html"
}

sessionStorage.setItem("gate","2")

let p=0

let timer=setInterval(()=>{

p+=20

document.getElementById("bar").style.width=p+"%"

if(p>=100){

clearInterval(timer)

location="https://tmearn.net/YOURADS"

}

},1000)

</script>

</body>
</html>
