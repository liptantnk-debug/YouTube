<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Get Link</title>

<style>

*{box-sizing:border-box;}

body{
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial,sans-serif;
color:#fff;
overflow:hidden;
text-align:center;

background:
radial-gradient(circle at center,
rgba(255,255,255,0.35) 0%,
rgba(220,220,220,0.25) 25%,
rgba(0,0,0,0.65) 70%,
rgba(0,0,0,0.9) 100%),
linear-gradient(120deg,#0f0f0f,#5a5a5a,#cfcfcf,#5a5a5a,#0f0f0f);

background-size:100% 100%,300% 300%;
animation:bgmove 12s ease infinite;
}

@keyframes bgmove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
width:90%;
max-width:420px;
padding:30px;
background:rgba(0,0,0,0.55);
border-radius:15px;
backdrop-filter:blur(6px);
box-shadow:0 0 25px rgba(0,0,0,0.6);
}

.video-thumb{
width:100%;
border-radius:10px;
margin-bottom:15px;
}

#status{
margin-bottom:15px;
font-size:18px;
}

#progress{
width:100%;
height:10px;
background:rgba(255,255,255,0.15);
border-radius:30px;
overflow:hidden;
margin-bottom:20px;
display:none;
}

#bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#00c853,#00e676,#00c853);
transition:width .1s linear;
}

/* BUTTON */

button{
width:100%;
padding:16px;
font-size:18px;
border:none;
border-radius:12px;

background:linear-gradient(90deg,#ff4b4b,#ff0000);

color:white;
cursor:pointer;

transition:
transform .18s cubic-bezier(.2,.8,.2,1),
box-shadow .18s ease,
filter .18s ease;

transform:translateZ(0);
will-change:transform;
}

/* hover */

button:hover{

transform:translateY(-4px) scale(1.04);

box-shadow:
0 10px 25px rgba(255,0,0,0.55),
0 0 12px rgba(255,0,0,0.35);

filter:brightness(1.1);

}

/* click */

button:active{

transform:translateY(1px) scale(.97);

box-shadow:
0 4px 10px rgba(0,0,0,0.4);

}

/* disabled */

button:disabled{
opacity:.6;
cursor:not-allowed;
transform:none;
box-shadow:none;
}

.page{display:none;}
.page.active{display:block;}

textarea{
width:100%;
height:100px;
border:none;
border-radius:10px;
padding:12px;
resize:none;
font-size:15px;
margin-bottom:20px;
}

.toast{
position:fixed;
top:-80px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.7);
padding:12px 20px;
border-radius:10px;
transition:.4s;
}

.toast.show{top:30px;}

.bubble{
position:fixed;
border-radius:50%;
background:rgba(255,255,255,0.15);
animation:float 10s linear infinite;
}

@keyframes float{
0%{transform:translateY(30vh) scale(.5);opacity:0;}
20%{opacity:1;}
100%{transform:translateY(-20vh) scale(1);opacity:0;}
}

</style>

</head>

<body>

<div class="container">

<div id="page1" class="page active">

<img class="video-thumb"
src="https://img.youtube.com/vi/FCfEYlq-RRg/maxresdefault.jpg">

<div id="status">Click Get Link to continue</div>

<div id="progress">
<div id="bar"></div>
</div>

<button id="getBtn">🚀 Get Link</button>

</div>

<div id="page2" class="page">

<h2>Your Script</h2>

<textarea id="text" readonly>
loadstring(game:HttpGet("https://example.com/script.lua"))()
</textarea>

<button onclick="copyText()">📄 Copy script</button>

</div>

</div>

<a id="adLink" target="_blank" style="display:none"></a>

<div id="toast" class="toast">✔ Copied</div>

<script>

let adOpened=false
let leftPage=false
let adStart=0
let checking=false

const ads=[
"https://omg10.com/4/10700946",
"https://omg10.com/4/10697514",
"https://omg10.com/4/10703023",
"https://omg10.com/4/10703026",
"https://omg10.com/4/10703028"
]

document.getElementById("getBtn").onclick=openAds

function openAds(){

if(adOpened) return

const ad=ads[Math.floor(Math.random()*ads.length)]

let link=document.getElementById("adLink")
link.href=ad
link.click()

document.getElementById("getBtn").disabled=true

adOpened=true
checking=true
leftPage=false
adStart=Date.now()

document.getElementById("status").innerText="Return to this page..."

}

document.addEventListener("visibilitychange",()=>{

if(document.hidden && adOpened){
leftPage=true
}

if(!document.hidden){
checkReturn()
}

})

window.addEventListener("focus",checkReturn)

function checkReturn(){

if(!checking) return

if(adOpened && leftPage){

checking=false

let stay=(Date.now()-adStart)/1000

if(stay<2){

document.getElementById("status").innerText="Please stay on Ads longer"

document.getElementById("getBtn").disabled=false
adOpened=false
leftPage=false
return
}

startCountdown()

adOpened=false
leftPage=false

}

}

function startCountdown(){

let duration=5000
let start=Date.now()

let status=document.getElementById("status")
let progress=document.getElementById("progress")
let bar=document.getElementById("bar")

progress.style.display="block"

function update(){

let elapsed=Date.now()-start
let percent=Math.min(elapsed/duration*100,100)

bar.style.width=percent+"%"

let seconds=Math.ceil((duration-elapsed)/1000)

if(seconds>0){
status.innerText="Please wait "+seconds+"s"
}

if(percent<100){

requestAnimationFrame(update)

}else{

status.innerText="Link Ready"
progress.style.display="none"

document.getElementById("page1").classList.remove("active")
document.getElementById("page2").classList.add("active")

}

}

update()

}

function copyText(){

let textarea=document.getElementById("text")

navigator.clipboard.writeText(textarea.value)

showToast()

}

function showToast(){

let toast=document.getElementById("toast")

toast.classList.add("show")

setTimeout(()=>{
toast.classList.remove("show")
},2000)

}

function createBubble(){

let b=document.createElement("div")

b.className="bubble"

let size=Math.random()*120+40

b.style.width=size+"px"
b.style.height=size+"px"
b.style.left=Math.random()*100+"%"

document.body.appendChild(b)

setTimeout(()=>b.remove(),10000)

}

setInterval(createBubble,700)

</script>

</body>
</html>
