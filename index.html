<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Unlock Script</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
background:#111;
color:white;
}

.container{
width:380px;
background:#1a1a1a;
padding:25px;
border-radius:15px;
box-shadow:0 0 30px rgba(0,0,0,0.8);
text-align:center;
}

.video-thumb{
width:100%;
border-radius:10px;
margin-bottom:20px;
}

.action{
width:100%;
padding:16px;
margin-bottom:12px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
background:#a50000;
color:white;
}

.action.completed{
background:#c90000;
}

.unlock{
margin-top:15px;
width:100%;
padding:16px;
border:none;
border-radius:10px;
font-size:17px;
background:#0b7d48;
color:white;
cursor:pointer;
display:none;
}

.progressbar{
height:6px;
background:#333;
border-radius:20px;
margin-top:15px;
overflow:hidden;
}

.bar{
height:100%;
width:0%;
background:#4cff90;
}

#progress{
display:none;
margin-top:15px;
}

textarea{
width:100%;
height:100px;
margin-top:20px;
border-radius:10px;
border:none;
padding:10px;
resize:none;
}

.copy{
margin-top:10px;
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:#ff0000;
color:white;
font-size:16px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<img class="video-thumb"
src="https://img.youtube.com/vi/-lCf-dBK1cs/maxresdefault.jpg">

<button id="step1" class="action" onclick="startAction(1)">
Subscribe Channel
</button>

<button id="step2" class="action" onclick="startAction(2)">
Like & Comment
</button>

<div id="status">0/2 actions completed</div>

<button id="unlock" class="unlock" onclick="openAds()">
Unlock Content
</button>

<div id="progress">

<div class="progressbar">
<div id="bar" class="bar"></div>
</div>

</div>

<div id="scriptPage" style="display:none">

<textarea id="script">
loadstring(game:HttpGet("https://raw.githubusercontent.com/your/script.lua"))()
</textarea>

<button class="copy" onclick="copyScript()">Copy Script</button>

</div>

</div>

<script>

let currentStep=0
let leaveTime=0
let left=false
let completed=0

function startAction(step){

currentStep=step
leaveTime=Date.now()

if(step==1){
window.open("https://www.youtube.com/@RealRaxScripts","_blank")
}

if(step==2){
window.open("https://youtu.be/-lCf-dBK1cs","_blank")
}

}

document.addEventListener("visibilitychange",function(){

if(document.hidden){
left=true
}

else{

if(left && currentStep!=0){

let stay=(Date.now()-leaveTime)/1000

if(stay>=3){
completeStep(currentStep)
}

currentStep=0
left=false

}

}

})

function completeStep(step){

let btn=document.getElementById("step"+step)

if(btn.classList.contains("completed")) return

btn.classList.add("completed")
btn.innerHTML="✔ Completed"

completed++

document.getElementById("status").innerText=
completed+"/2 actions completed"

if(completed==2){

document.getElementById("unlock").style.display="block"

}

}

let adOpened=false
let adStart=0
let progressStarted=false

const ads=[
"https://omg10.com/4/10700946",
"https://omg10.com/4/10697514",
"https://omg10.com/4/10703023"
]

function openAds(){

if(adOpened) return

let ad=ads[Math.floor(Math.random()*ads.length)]

window.open(ad,"_blank")

adOpened=true
adStart=Date.now()

}

window.addEventListener("focus",function(){

if(adOpened && !progressStarted){

let stay=(Date.now()-adStart)/1000

if(stay>=3){

progressStarted=true
startProgress()

}

adOpened=false

}

})

function startProgress(){

let progress=document.getElementById("progress")

progress.style.display="block"

let bar=document.getElementById("bar")

let start=Date.now()

let duration=5000

function update(){

let percent=(Date.now()-start)/duration*100

if(percent>100) percent=100

bar.style.width=percent+"%"

if(percent<100){

requestAnimationFrame(update)

}else{

document.getElementById("scriptPage").style.display="block"

}

}

update()

}

function copyScript(){

let text=document.getElementById("script")

navigator.clipboard.writeText(text.value)

alert("Copied")

}

</script>

</body>
</html>
