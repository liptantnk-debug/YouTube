<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Access Page</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:#000;
font-family:sans-serif;
color:white;
overflow:hidden;
}

/* Bubble background */
.bubble{
position:absolute;
bottom:-100px;
width:10px;
height:10px;
background:rgba(255,255,255,0.15);
border-radius:50%;
animation:rise linear infinite;
}

@keyframes rise{
0%{transform:translateY(0) scale(1);}
100%{transform:translateY(-120vh) scale(1.5);}
}

/* Buttons */
button{
width:220px;
padding:15px;
margin:10px;
font-size:16px;
border:none;
border-radius:12px;
cursor:pointer;
transition:all .2s ease;
}

button:hover{
transform:translateY(-4px);
}

button:active{
transform:scale(0.92);
}

/* Ads button */
#adsBtn{
background:linear-gradient(45deg,#ff8a00,#ff3d00);
color:white;
}

/* Target button */
#targetBtn{
background:linear-gradient(45deg,#ffd700,#ffb300);
color:black;
display:none;
}

/* Progress Bar */
.progressBox{
position:fixed;
bottom:20px;
left:20px;
width:200px;
height:10px;
background:rgba(255,255,255,0.1);
border-radius:10px;
overflow:hidden;
}

.progress{
height:100%;
width:0%;
background:linear-gradient(90deg,#ffd700,#ffb300,#ffd700);
transition:width 0.1s linear;
}
</style>
</head>

<body>

<h2 id="status">กดปุ่มโฆษณาก่อน</h2>

<button id="adsBtn">ดูโฆษณา</button>
<button id="targetBtn" onclick="goTarget()">ไปหน้าปลายทาง</button>

<div class="progressBox">
<div class="progress" id="bar"></div>
</div>

<script>

const ADS_LINK = "https://omg10.com/4/10697514"
const TARGET_LINK = "https://sites.google.com/view/realraxsc/home-%E0%B8%AB%E0%B8%99%E0%B8%B2%E0%B9%80%E0%B8%A7%E0%B8%9A%E0%B8%AB%E0%B8%A5%E0%B8%81"

let cooldown = false

const statusText = document.getElementById("status")
const targetBtn = document.getElementById("targetBtn")
const bar = document.getElementById("bar")

function startCooldown(){

cooldown = true
let time = 5
let progress = 0

statusText.innerText = "กรุณารอ 5 วินาที..."

const interval = setInterval(()=>{

progress += 2
bar.style.width = progress + "%"

},100)

const timer = setInterval(()=>{

time--
statusText.innerText = "กรุณารอ " + time + " วินาที..."

if(time <= 0){

clearInterval(timer)
clearInterval(interval)

statusText.innerText = "ไปหน้าปลายทางได้แล้ว"
targetBtn.style.display="block"

}

},1000)

}

document.getElementById("adsBtn").onclick = function(){

window.open(ADS_LINK,"_blank")

setTimeout(()=>{
startCooldown()
},500)

}

function goTarget(){
window.location.href = TARGET_LINK
}

/* Bubble generator */

for(let i=0;i<35;i++){

let bubble=document.createElement("div")
bubble.className="bubble"

bubble.style.left=Math.random()*100+"%"
bubble.style.animationDuration=(5+Math.random()*5)+"s"
bubble.style.opacity=Math.random()

document.body.appendChild(bubble)

}

/* FIX รีเฟรชมือถือ */

window.addEventListener("pageshow",function(event){
if(event.persisted){
location.reload()
}
})

</script>

</body>
</html>
