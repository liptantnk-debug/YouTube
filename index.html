<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Get Link</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
color:white;

background:linear-gradient(45deg,#020617,#0f172a,#1e293b);
background-size:400%;
animation:bg 10s infinite alternate;
}

@keyframes bg{
0%{background-position:left}
100%{background-position:right}
}

.card{
background:rgba(255,255,255,0.05);
padding:40px;
border-radius:18px;
text-align:center;
width:320px;
backdrop-filter:blur(10px);
box-shadow:0 0 30px rgba(0,0,0,0.5);
}

button{
margin-top:20px;
width:100%;
padding:15px;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
color:white;

background:linear-gradient(90deg,#6366f1,#3b82f6,#6366f1);
background-size:200%;
animation:btn 3s linear infinite;
}

@keyframes btn{
0%{background-position:0}
100%{background-position:200%}
}

button:hover{
transform:scale(1.05);
}

</style>
</head>

<body>

<div class="card">

<h2>Generate Link</h2>

<p>Click the button to unlock your link</p>

<button onclick="start()">Get Link</button>

</div>

<script>

function start(){

sessionStorage.setItem("gate","1")

location="gate.html"

}

</script>

</body>
</html>
