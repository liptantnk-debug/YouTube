<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>

body{
background:#0f0f0f;
color:white;
font-family:sans-serif;
margin:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
}

img{
width:100%;
border-radius:10px;
}

a{
text-decoration:none;
color:white;
}

</style>
</head>

<body>

<div class="grid" id="videos"></div>

<script>

const channel="UC6wYoQiwRAFNf9MHlvJQbKA";

fetch("https://www.youtube.com/feeds/videos.xml?channel_id="+channel)
.then(r=>r.text())
.then(str => new window.DOMParser().parseFromString(str,"text/xml"))
.then(data=>{

let items=data.querySelectorAll("entry")
let html=""

for(let i=0;i<3;i++){

let link=items[i].querySelector("link").getAttribute("href")
let id=link.split("v=")[1]

let title=items[i].querySelector("title").textContent

html+=`
<a href="${link}" target="_blank">
<img src="https://img.youtube.com/vi/${id}/hqdefault.jpg">
<p>${title}</p>
</a>
`

}

document.getElementById("videos").innerHTML=html

})

</script>

</body>
</html>
