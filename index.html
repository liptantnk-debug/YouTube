<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Get Link</title>

<style>

*{box-sizing:border-box;}

body{
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial, sans-serif;
color:#fff;
overflow:hidden;
text-align:center;

background:
radial-gradient(circle at center,
rgba(255,255,255,0.35) 0%,
rgba(220,220,220,0.25) 25%,
rgba(0,0,0,0.65) 70%,
rgba(0,0,0,0.9) 100%),
linear-gradient(120deg,#0f0f0f,#5a5a5a,#cfcfcf,#5a5a5a,#0f0f0f);

background-size:100% 100%,300% 300%;
animation:bgmove 12s ease infinite;
}

@keyframes bgmove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
width:90%;
max-width:420px;
padding:30px;
background:rgba(0,0,0,0.55);
border-radius:15px;
backdrop-filter:blur(6px);
box-shadow:0 0 25px rgba(0,0,0,0.6);
}

#status{
margin-bottom:15px;
font-size:18px;
}

#progress{
width:100%;
height:10px;
background:rgba(255,255,255,0.15);
border-radius:30px;
overflow:hidden;
margin-bottom:20px;
display:none;
}

#bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#ff4b4b,#ff0000,#ff4b4b);
background-size:200% 100%;
animation:shine 1.5s linear infinite;
transition:width 0.1s linear;
}

@keyframes shine{
0%{background-position:200% 0;}
100%{background-position:-200% 0;}
}

button{
width:100%;
padding:16px;
font-size:18px;
border:none;
border-radius:12px;
background:linear-gradient(#ff4b4b,#ff0000);
color:white;
cursor:pointer;
}

#target{
display:none;
margin-top:20px;
}

#target a{
display:block;
padding:14px;
background:white;
border-radius:10px;
color:black;
text-decoration:none;
font-size:18px;
}

.bubble{
position:fixed;
border-radius:50%;
background:rgba(255,255,255,0.15);
animation:float 10s linear infinite;
}

@keyframes float{
0%{transform:translateY(30vh) scale(0.5);opacity:0;}
20%{opacity:1;}
100%{transform:translateY(-20vh) scale(1);opacity:0;}
}

.line{
position:fixed;
width:2px;
height:40px;
background:rgba(255,255,255,0.4);
animation:fall 4s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-50px);opacity:0;}
20%{opacity:1;}
100%{transform:translateY(110vh);opacity:0;}
}

</style>

</head>

<body>

<div class="container">

<div id="status">Click Get Link</div>

<div id="progress">
<div id="bar"></div>
</div>

<button onclick="openAds()">🚀 Get Link</button>

<div id="target">
<a href="copyscript.html" target="_blank" rel="noopener noreferrer">
➡ Go To Website
</a>
</div>

</div>

<script>

let adOpened=false
let leftPage=false
let adStart=0

function createBubble(){
let b=document.createElement("div")
b.className="bubble"
let size=Math.random()*120+40
b.style.width=size+"px"
b.style.height=size+"px"
b.style.left=Math.random()*100+"%"
document.body.appendChild(b)
setTimeout(()=>b.remove(),10000)
}

setInterval(createBubble,600)

function createLine(){
let l=document.createElement("div")
l.className="line"
l.style.left=Math.random()*100+"%"
document.body.appendChild(l)
setTimeout(()=>l.remove(),4000)
}

setInterval(createLine,600)

function openAds(){

window.open("https://omg10.com/4/10700946","_blank")

adOpened=true
adStart=Date.now()

document.getElementById("status").innerText="Return to this page..."

}

document.addEventListener("visibilitychange",function(){

if(document.hidden && adOpened){

leftPage=true

}

if(!document.hidden && adOpened && leftPage){

let stayTime=(Date.now()-adStart)/1000

if(stayTime<3){

document.getElementById("status").innerText="Please stay on Ads longer"

adOpened=false
leftPage=false
return

}

startCountdown()

adOpened=false
leftPage=false

}

})

function startCountdown(){

let duration=5000
let start=Date.now()

let status=document.getElementById("status")
let progress=document.getElementById("progress")
let bar=document.getElementById("bar")

progress.style.display="block"

function update(){

let now=Date.now()
let elapsed=now-start
let percent=Math.min(elapsed/duration*100,100)

bar.style.width=percent+"%"

let seconds=Math.ceil((duration-elapsed)/1000)

if(seconds>0){
status.innerText="Please wait "+seconds+"s"
}

if(percent<100){

requestAnimationFrame(update)

}else{

status.innerText="Link Ready"
progress.style.display="none"
document.getElementById("target").style.display="block"

}

}

update()

}

</script>

</body>
</html>
