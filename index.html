<script>

let adOpened = false
let leftPage = false
let countdownStarted = false
let adStartTime = 0

function openAds(){

window.open("https://omg10.com/4/10697514","_blank")

adOpened = true
adStartTime = Date.now()

document.getElementById("status").innerText="Return to this page..."

}

/* ตรวจจับการออกจากหน้าเว็บ */

document.addEventListener("visibilitychange", function(){

if(document.hidden && adOpened){
leftPage = true
}

/* กลับมาหน้าเว็บ */

if(!document.hidden && adOpened && leftPage && !countdownStarted){

let stayTime = (Date.now() - adStartTime) / 1000

if(stayTime < 2){
document.getElementById("status").innerText="Please stay on Ads longer"
return
}

startCountdown()

}

})

function startCountdown(){

countdownStarted = true

let duration = 5000
let start = Date.now()

let status = document.getElementById("status")
let progress = document.getElementById("progress")
let bar = document.getElementById("bar")

progress.style.display = "block"

function update(){

let now = Date.now()
let elapsed = now - start
let percent = Math.min(elapsed / duration * 100 , 100)

bar.style.width = percent + "%"

let seconds = Math.ceil((duration - elapsed)/1000)

if(seconds > 0){
status.innerText = "Please wait " + seconds + "s"
}

if(percent < 100){

requestAnimationFrame(update)

}else{

status.innerText="Link Ready"
progress.style.display="none"

document.getElementById("target").style.display="block"

}

}

update()

}

</script>
