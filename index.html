<!DOCTYPE html>
<html>
<head>
<title>Unlock Link</title>

<style>
body{
text-align:center;
font-family:Arial;
margin-top:120px;
background:#0f172a;
color:white;
}

.unlock-btn{
padding:14px 40px;
font-size:18px;
font-weight:bold;
border:none;
border-radius:8px;
background:linear-gradient(45deg,#ff0000,#ff5050);
color:white;
cursor:pointer;
box-shadow:0 6px 20px rgba(0,0,0,0.4);
transition:all 0.2s ease;
}

.unlock-btn:hover{
transform:translateY(-2px);
background:linear-gradient(45deg,#ff3030,#ff7070);
}

.unlock-btn:active{
transform:scale(0.96);
}

.unlock-btn:disabled{
background:#555;
cursor:not-allowed;
}

.timer{
font-size:18px;
margin-bottom:20px;
opacity:0.8;
}
</style>

<script>

const cooldown = 5;

function checkCooldown(){

let lastClick = localStorage.getItem("lastUnlock");
let button = document.getElementById("unlockBtn");
let timer = document.getElementById("timer");

if(!lastClick){
button.disabled=false;
timer.innerHTML="Ready to unlock";
return;
}

let timePassed = Math.floor((Date.now() - lastClick)/1000);
let timeLeft = cooldown - timePassed;

if(timeLeft <= 0){
button.disabled=false;
timer.innerHTML="Ready to unlock";
}else{

button.disabled=true;

let interval = setInterval(function(){

timeLeft--;

timer.innerHTML="Cooldown: "+timeLeft+"s";

if(timeLeft<=0){
clearInterval(interval);
button.disabled=false;
timer.innerHTML="Ready to unlock";
}

},1000);

}

}

function openAd(){

localStorage.setItem("lastUnlock",Date.now());

window.open("https://omg10.com/4/10697514","_blank");

}

window.onload = checkCooldown;

</script>

</head>

<body>

<h2>🔒 Link Locked</h2>

<div id="timer" class="timer">
Checking cooldown...
</div>

<button id="unlockBtn" class="unlock-btn" onclick="openAd()">
🚀 Unlock Link
</button>

</body>
</html>
