<!DOCTYPE html>
<html>
<head>
<title>Unlock Link</title>

<style>
body{
text-align:center;
font-family:Arial;
margin-top:120px;
background:#0f172a;
color:white;
}

.unlock-btn{
padding:14px 40px;
font-size:18px;
font-weight:bold;
border:none;
border-radius:8px;
background:linear-gradient(45deg,#ff0000,#ff5050);
color:white;
cursor:pointer;
box-shadow:0 6px 20px rgba(0,0,0,0.4);
transition:all 0.2s ease;
}

.unlock-btn:hover{
transform:translateY(-2px);
background:linear-gradient(45deg,#ff3030,#ff7070);
}

.unlock-btn:disabled{
background:#555;
cursor:not-allowed;
}

.timer{
font-size:18px;
margin-bottom:20px;
opacity:0.8;
}
</style>

<script>

const cooldown = 5;

function updateCooldown(){

let button = document.getElementById("unlockBtn");
let timer = document.getElementById("timer");

let last = localStorage.getItem("unlockTime");

if(!last){
button.disabled=false;
timer.innerText="Ready";
return;
}

let passed = Math.floor((Date.now() - last)/1000);
let left = cooldown - passed;

if(left <= 0){
button.disabled=false;
timer.innerText="Ready";
return;
}

button.disabled=true;
timer.innerText="Cooldown: "+left+"s";

let interval = setInterval(function(){

left--;

if(left <= 0){
clearInterval(interval);
button.disabled=false;
timer.innerText="Ready";
}else{
timer.innerText="Cooldown: "+left+"s";
}

},1000);

}

function openAd(){

localStorage.setItem("unlockTime",Date.now());

window.open("https://omg10.com/4/10697514","_blank");

}

window.addEventListener("load",updateCooldown);
window.addEventListener("pageshow",updateCooldown);

</script>

</head>

<body>

<h2>🔒 Link Locked</h2>

<div id="timer" class="timer">Checking...</div>

<button id="unlockBtn" class="unlock-btn" onclick="openAd()">
🚀 Unlock Link
</button>

</body>
</html>
