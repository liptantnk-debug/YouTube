<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Background</title>

<style>

body{
margin:0;
height:100vh;
overflow:hidden;
font-family:sans-serif;

/* gradient ขาวดำ */

background: linear-gradient(135deg,#ffffff,#dcdcdc,#bfbfbf);

}

/* bubble */

.bubble{
position:absolute;
border-radius:50%;
background:rgba(0,0,0,0.08);
animation:float 18s infinite linear;
}

@keyframes float{

0%{
transform:translateY(100vh);
}

100%{
transform:translateY(-20vh);
}

}

/* rain line */

.line{

position:absolute;
width:2px;
height:40px;

background:rgba(0,0,0,0.25);

transform:rotate(20deg);

animation:fall 4s linear infinite;

}

@keyframes fall{

0%{
transform:translateY(-50px) rotate(20deg);
opacity:0;
}

20%{
opacity:1;
}

100%{
transform:translateY(110vh) rotate(20deg);
opacity:0;
}

}

</style>
</head>

<body>

<script>

/* bubble generator */

function createBubble(){

let b=document.createElement("div");

b.className="bubble";

let size=Math.random()*120+40;

b.style.width=size+"px";
b.style.height=size+"px";

b.style.left=Math.random()*100+"%";

b.style.animationDuration=(Math.random()*10+15)+"s";

document.body.appendChild(b);

setTimeout(()=>{b.remove()},20000);

}

setInterval(createBubble,800);


/* rain generator */

function createLine(){

let l=document.createElement("div");

l.className="line";

l.style.left=Math.random()*100+"%";

l.style.animationDuration=(Math.random()*2+3)+"s";

document.body.appendChild(l);

setTimeout(()=>{l.remove()},5000);

}

setInterval(createLine,500);

</script>

</body>
</html>
