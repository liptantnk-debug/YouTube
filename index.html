<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Get Link</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:Arial;
background:#000;
color:white;
overflow:hidden;
}

#status{
margin-bottom:20px;
font-size:18px;
}

button{
padding:16px 45px;
font-size:20px;
border:none;
border-radius:12px;
background:linear-gradient(#ff4b4b,#ff0000);
color:white;
cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,0.6);
transition:0.2s;
}

button:hover{
transform:scale(1.05);
}

button:disabled{
background:#444;
cursor:not-allowed;
}

#target{
display:none;
margin-top:20px;
}

#target a{
color:#00ff9c;
font-size:18px;
text-decoration:none;
}

/* หิมะ */

.snow{
position:fixed;
top:-10px;
color:white;
opacity:0.9;
pointer-events:none;
animation:fall linear forwards;
}

@keyframes fall{
to{transform:translateY(110vh);}
}

</style>
</head>

<body>

<div id="status">Click Get Link</div>

<button id="btn" onclick="unlock()">🚀 Get Link</button>

<div id="target">
<a href="https://linkunlocker.com/delta-x-27102-OX6oY" target="_blank">
➡ Go To Website
</a>
</div>

<script>

let adClicked = false;

/* หิมะ */

function snow(){
let s=document.createElement("div");
s.className="snow";
s.innerHTML="•";
s.style.left=Math.random()*100+"%";
s.style.fontSize=(Math.random()*6+4)+"px";

let duration=Math.random()*5+5;
s.style.animationDuration=duration+"s";

document.body.appendChild(s);

setTimeout(()=>{s.remove();},duration*1000);
}

setInterval(snow,120);


/* กดปุ่ม */

function unlock(){

window.open("https://omg10.com/4/10697514","_blank");

adClicked = true;

document.getElementById("status").innerText = "Return to this page...";

}


/* ตรวจว่ากลับมาที่หน้าเว็บ */

document.addEventListener("visibilitychange", function(){

if(!document.hidden && adClicked){

startCountdown();

adClicked = false;

}

});


/* เริ่มนับเวลา */

function startCountdown(){

let time = 5;
let status = document.getElementById("status");

status.innerText = "Please wait " + time + "s";

let timer = setInterval(function(){

time--;

status.innerText = "Please wait " + time + "s";

if(time <= 0){

clearInterval(timer);

status.innerText = "Link Ready";

document.getElementById("target").style.display="block";

}

},1000);

}

</script>

</body>
</html>
