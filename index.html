<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Get Link</title>

<style>

*{box-sizing:border-box;}

body{
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial, sans-serif;
color:#fff;
overflow:hidden;
text-align:center;

background:
radial-gradient(circle at center,
rgba(255,255,255,0.35) 0%,
rgba(220,220,220,0.25) 25%,
rgba(0,0,0,0.65) 70%,
rgba(0,0,0,0.9) 100%),
linear-gradient(120deg,#0f0f0f,#5a5a5a,#cfcfcf,#5a5a5a,#0f0f0f);

background-size:100% 100%,300% 300%;
animation:bgmove 12s ease infinite;
}

@keyframes bgmove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
width:90%;
max-width:420px;
padding:30px;
background:rgba(0,0,0,0.55);
border-radius:15px;
backdrop-filter:blur(6px);
box-shadow:0 0 25px rgba(0,0,0,0.6);
}

.video-thumb{
width:100%;
border-radius:10px;
margin-bottom:15px;
}

.yt-btn{
margin-bottom:10px;
}

#status{
margin-bottom:15px;
font-size:18px;
}

#progress{
width:100%;
height:10px;
background:rgba(255,255,255,0.15);
border-radius:30px;
overflow:hidden;
margin-bottom:20px;
display:none;
}

#bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#ff4b4b,#ff0000,#ff4b4b);
background-size:200% 100%;
animation:shine 1.5s linear infinite;
transition:width 0.1s linear;
}

@keyframes shine{
0%{background-position:200% 0;}
100%{background-position:-200% 0;}
}

button{
width:100%;
padding:16px;
font-size:18px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#ff4b4b,#ff0000,#ff4b4b);
background-size:200% 100%;
color:white;
cursor:pointer;
animation:shine 2s linear infinite;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 20px rgba(255,0,0,0.7);
}

#getBtn{
display:none;
}

.page{
display:none;
}

.page.active{
display:block;
}

textarea{
width:100%;
height:100px;
border:none;
border-radius:10px;
padding:12px;
resize:none;
font-size:15px;
margin-bottom:20px;
}

.toast{
position:fixed;
top:-80px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.7);
padding:12px 20px;
border-radius:10px;
transition:0.4s;
}

.toast.show{
top:30px;
}

</style>

</head>

<body>

<div class="container">

<div id="page1" class="page active">

<img class="video-thumb"
src="https://img.youtube.com/vi/VIDEO_ID/maxresdefault.jpg">

<button class="yt-btn" onclick="subscribe()">❤️ Subscribe Channel</button>

<button class="yt-btn" onclick="likeVideo()">💬 Like & Comment</button>

<div id="status">Complete steps to unlock Get Link</div>

<div id="progress">
<div id="bar"></div>
</div>

<button id="getBtn" onclick="openAds()">🚀 Get Link</button>

</div>

<div id="page2" class="page">

<h2>Your Script</h2>

<textarea id="text" readonly>
loadstring(game:HttpGet("https://raw.githubusercontent
</textarea>

<button id="copyBtn" onclick="copyText()">📄 Copy script</button>

</div>

</div>

<div id="toast" class="toast">✔ Copied</div>

<script>

let subscribed=false
let liked=false

function subscribe(){

window.open("CHANNEL_LINK","_blank")
subscribed=true
checkSteps()

}

function likeVideo(){

window.open("VIDEO_LINK","_blank")
liked=true
checkSteps()

}

function checkSteps(){

if(subscribed && liked){

document.getElementById("status").innerText="Get Link Unlocked"
document.getElementById("getBtn").style.display="block"

}

}

let adOpened=false
let leftPage=false
let adStart=0
let countdownStarted=false
let mustLeave=false

const ads=[
"https://omg10.com/4/10700946",
"https://omg10.com/4/10697514",
"https://omg10.com/4/10703023",
"https://omg10.com/4/10703026",
"https://omg10.com/4/10703028"
]

function openAds(){

if(adOpened) return

document.getElementById("getBtn").disabled=true

const randomAd=ads[Math.floor(Math.random()*ads.length)]

window.open(randomAd,"_blank")

adOpened=true
mustLeave=true
adStart=Date.now()

document.getElementById("status").innerText="Return to this page..."

}

document.addEventListener("visibilitychange",function(){

if(document.hidden && adOpened){
leftPage=true
}

if(!document.hidden){
checkReturn()
}

})

function checkReturn(){

if(adOpened && leftPage && mustLeave && !countdownStarted){

let stayTime=(Date.now()-adStart)/1000

if(stayTime<3){

document.getElementById("status").innerText="Please stay on Ads longer"

adOpened=false
leftPage=false
document.getElementById("getBtn").disabled=false
return

}

startCountdown()

adOpened=false
leftPage=false

}

}

function startCountdown(){

countdownStarted=true

let duration=5000
let start=Date.now()

let status=document.getElementById("status")
let progress=document.getElementById("progress")
let bar=document.getElementById("bar")

progress.style.display="block"

function update(){

let elapsed=Date.now()-start
let percent=Math.min(elapsed/duration*100,100)

bar.style.width=percent+"%"

let seconds=Math.ceil((duration-elapsed)/1000)

if(seconds>0){
status.innerText="Please wait "+seconds+"s"
}

if(percent<100){

requestAnimationFrame(update)

}else{

status.innerText="Link Ready"
progress.style.display="none"

document.getElementById("page1").classList.remove("active")
document.getElementById("page2").classList.add("active")

mustLeave=false

}

}

update()

}

function copyText(){

let textarea=document.getElementById("text")

navigator.clipboard.writeText(textarea.value)

showToast()

}

function showToast(){

let toast=document.getElementById("toast")

toast.classList.add("show")

setTimeout(()=>{
toast.classList.remove("show")
},2000)

}

</script>

</body>
</html>
