<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Get Link</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
color:white;
text-align:center;
background:linear-gradient(120deg,#000,#666,#ddd,#666,#000);
background-size:300% 300%;
animation:bg 10s infinite alternate;
}

@keyframes bg{
0%{background-position:0% 50%}
100%{background-position:100% 50%}
}

.box{
background:rgba(0,0,0,.6);
padding:30px;
border-radius:15px;
width:90%;
max-width:400px;
}

button,a{
display:block;
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:10px;
font-size:18px;
cursor:pointer;
text-decoration:none;
}

button{
background:#ff0000;
color:white;
}

#go{
display:none;
background:white;
color:black;
}

#bar{
height:8px;
background:red;
width:0%;
margin-top:15px;
border-radius:10px;
display:none;
}

</style>
</head>

<body>

<div class="box">

<h2 id="status">Click Get Link</h2>

<button onclick="start()">🚀 Get Link</button>

<div id="bar"></div>

<a id="go" href="#">➡ Go To Website</a>

</div>

<script>

function start(){

location.href="https://omg10.com/4/10700946"

}

window.addEventListener("pageshow",()=>{

if(!localStorage.getItem("adtime")){

localStorage.setItem("adtime",Date.now())
return

}

let stay=(Date.now()-localStorage.getItem("adtime"))/1000

if(stay<3){
document.getElementById("status").innerText="Stay on Ads longer"
localStorage.removeItem("adtime")
return
}

localStorage.removeItem("adtime")

countdown()

})

function countdown(){

let bar=document.getElementById("bar")
let status=document.getElementById("status")
let go=document.getElementById("go")

bar.style.display="block"

let t=5
let i=setInterval(()=>{

t--

bar.style.width=(100-(t*20))+"%"

status.innerText="Please wait "+t+"s"

if(t<=0){

clearInterval(i)

status.innerText="Link Ready"

let token=Math.random().toString(36).slice(2)

localStorage.setItem("token",token)

go.style.display="block"
go.href="copyscript.html?token="+token

}

},1000)

}

</script>

</body>
</html>
