<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Get Link</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
font-family:Arial;
background:#000;
color:#fff;
overflow:hidden;
}

#status{
margin-bottom:20px;
font-size:18px;
}

button{
padding:16px 45px;
font-size:20px;
border:none;
border-radius:12px;
background:linear-gradient(#ff4b4b,#ff0000);
color:white;
cursor:pointer;
box-shadow:0 10px 25px rgba(0,0,0,0.6);
transition:0.2s;
}

button:hover{
transform:scale(1.05);
}

button:disabled{
background:#444;
cursor:not-allowed;
}

#target{
display:none;
margin-top:20px;
}

#target a{
color:#00ff9c;
font-size:18px;
text-decoration:none;
}

/* หิมะ */

.snow{
position:fixed;
top:-10px;
color:white;
opacity:0.9;
pointer-events:none;
animation:fall linear forwards;
}

@keyframes fall{
to{transform:translateY(110vh);}
}

</style>
</head>

<body>

<div id="status">Ready</div>

<button id="btn" onclick="unlock()">🚀 Get Link</button>

<div id="target">
<a href="https://sites.google.com/view/realraxsc/home-%E0%B8%AB%E0%B8%99%E0%B8%B2%E0%B9%80%E0%B8%A7%E0%B8%9A%E0%B8%AB%E0%B8%A5%E0%B8%81?fbclid=PARlRTSAQaLSxleHRuA2FlbQIxMABzcnRjBmFwcF9pZA8xMjQwMjQ1NzQyODc0MTQAAad6v8PNTVmQrVcuuZcp-Hm7QUnRwqFHavk9dpjN48sSp8Lxdlu3vz2-qjfgKQ_aem_5xRiwHWZma57UewmqJWHPA" target="_blank">
➡ Go To Website
</a>
</div>

<script>

/* หิมะ */

function snow(){
let s=document.createElement("div");
s.className="snow";
s.innerHTML="•";
s.style.left=Math.random()*100+"%";
s.style.fontSize=(Math.random()*6+4)+"px";

let duration=Math.random()*5+5;
s.style.animationDuration=duration+"s";

document.body.appendChild(s);

setTimeout(()=>{s.remove();},duration*1000);
}

setInterval(snow,120);


/* ระบบปุ่ม */

function unlock(){

let btn=document.getElementById("btn");
let status=document.getElementById("status");
let target=document.getElementById("target");

btn.disabled=true;

window.open("https://omg10.com/4/10697514","_blank");

let time=5;

status.innerText="Please wait "+time+"s";

let timer=setInterval(function(){

time--;

status.innerText="Please wait "+time+"s";

if(time<=0){

clearInterval(timer);

status.innerText="Link Ready";

target.style.display="block";

}

},1000);

}

</script>

</body>
</html>
