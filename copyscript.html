<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copy Text</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:sans-serif;
overflow:hidden;

/* background แบบภาพ */
background:
radial-gradient(circle at center,#9e9e9e 0%,#4b4b4b 40%,#111 90%);
}

/* particles */

body::before{
content:"";
position:absolute;
width:100%;
height:100%;
background-image:
radial-gradient(circle,rgba(255,255,255,0.15) 4px,transparent 5px),
radial-gradient(circle,rgba(255,255,255,0.1) 7px,transparent 8px),
radial-gradient(circle,rgba(255,255,255,0.08) 10px,transparent 11px);
background-size:300px 300px;
opacity:.5;
}

/* card */

.card{
width:320px;
background:#2b2b2b;
padding:25px;
border-radius:16px;
box-shadow:0 15px 40px rgba(0,0,0,.6);
text-align:center;
position:relative;
z-index:2;
}

.title{
color:white;
font-size:22px;
margin-bottom:15px;
}

textarea{
width:100%;
height:90px;
border:none;
outline:none;
resize:none;
padding:12px;
border-radius:10px;
font-size:14px;
box-sizing:border-box;
}

button{
margin-top:15px;
width:100%;
padding:14px;
border:none;
border-radius:10px;
font-size:16px;
color:white;
cursor:pointer;
background:linear-gradient(180deg,#ff3c3c,#ff0000);
box-shadow:0 0 15px rgba(255,0,0,0.4);
transition:.2s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 25px rgba(255,0,0,0.7);
}

/* toast */

.toast{
position:fixed;
top:-80px;
left:50%;
transform:translateX(-50%);
background:#2b2b2b;
color:white;
padding:14px 25px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.7);
transition:.4s;
}

.toast.show{
top:30px;
}

</style>
</head>

<body>

<div class="card">

<div class="title">🔗 Your Text</div>

<textarea id="text">ใส่ข้อความอะไรก็ได้</textarea>

<button onclick="copyText()">📄 Copy Text</button>

</div>

<div id="toast" class="toast">คัดลอกแล้ว</div>

<script>

function copyText(){

let text=document.getElementById("text").value;

navigator.clipboard.writeText(text).then(()=>{
showToast("คัดลอกแล้ว");
});

}

function showToast(msg){

let toast=document.getElementById("toast");

toast.innerText=msg;

toast.classList.add("show");

setTimeout(()=>{
toast.classList.remove("show");
},2000);

}

</script>

</body>
</html>
