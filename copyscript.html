<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Copy Link</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
color:white;

background:
radial-gradient(circle at center,
rgba(255,255,255,0.35),
rgba(0,0,0,0.9)),
linear-gradient(120deg,#0f0f0f,#5a5a5a,#cfcfcf,#5a5a5a,#0f0f0f);

background-size:300% 300%;
animation:bg 10s infinite alternate;
}

@keyframes bg{
0%{background-position:0%}
100%{background-position:100%}
}

.box{
width:90%;
max-width:420px;
background:rgba(0,0,0,.55);
padding:30px;
border-radius:15px;
text-align:center;
}

textarea{
width:100%;
height:100px;
border-radius:10px;
border:none;
padding:10px;
resize:none;
}

button{
margin-top:15px;
width:100%;
padding:15px;
font-size:18px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#ff4b4b,#ff0000,#ff4b4b);
color:white;
cursor:pointer;
transition:.25s;
}

button:hover{
transform:translateY(-3px) scale(1.05);
box-shadow:0 10px 25px rgba(255,0,0,.6);
}

#notice{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:#00c853;
padding:10px 20px;
border-radius:8px;
display:none;
}

</style>

</head>

<body>

<div id="notice">Copied</div>

<div class="box">

<h2>Copy Text</h2>

<textarea id="text" readonly>
ใส่ข้อความหรือสคริปต์ที่ต้องการให้ copy ที่นี่
</textarea>

<button onclick="copyText()">Copy Text</button>

</div>

<script>

function copyText(){

let text=document.getElementById("text")

navigator.clipboard.writeText(text.value)

let notice=document.getElementById("notice")

notice.style.display="block"

setTimeout(()=>{
notice.style.display="none"
},2000)

setTimeout(()=>{
window.location.href="https://example.com"
},500)

}

</script>

</body>
</html>
