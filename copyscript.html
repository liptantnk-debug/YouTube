<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Copy Script</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
color:white;
text-align:center;
background:linear-gradient(120deg,#000,#666,#ddd,#666,#000);
background-size:300% 300%;
animation:bg 10s infinite alternate;
}

@keyframes bg{
0%{background-position:0% 50%}
100%{background-position:100% 50%}
}

.box{
background:rgba(0,0,0,.6);
padding:30px;
border-radius:15px;
width:90%;
max-width:400px;
}

textarea{
width:100%;
height:100px;
border:none;
border-radius:10px;
padding:10px;
margin-bottom:15px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:10px;
font-size:18px;
background:red;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<div class="box">

<h2>Copy Script</h2>

<textarea id="text" readonly>
loadstring(game:HttpGet("https://raw.githubusercontent.com/meobeo8/a/a/a"))()
</textarea>

<button onclick="copy()">📄 Copy Script</button>

</div>

<script>

let p=new URLSearchParams(location.search)

let token=p.get("token")

if(token!==localStorage.getItem("token")){

location.href="index.html"

}

function copy(){

navigator.clipboard.writeText(
document.getElementById("text").value
)

alert("Copied")

localStorage.removeItem("token")

}

</script>

</body>
</html>
