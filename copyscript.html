<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copy Script</title>

<style>

body{
margin:0;
background:#000;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.box{
background:#0b0b0b;
padding:35px;
border-radius:16px;
width:340px;
text-align:center;
box-shadow:0 0 40px rgba(0,0,0,0.9);
}

h2{
margin-bottom:15px;
}

textarea{
width:100%;
height:120px;
background:#000;
border:none;
border-radius:10px;
color:#00ff9d;
padding:12px;
resize:none;
font-size:14px;
margin-bottom:20px;
}

.btn{
width:100%;
padding:15px;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
margin-top:12px;

background:linear-gradient(90deg,#ff0000,#ff3c3c,#ff0000);
background-size:200% 100%;
color:white;

animation:shine 2s linear infinite;
transition:0.2s;
}

.btn:hover{
transform:scale(1.05);
box-shadow:0 0 20px red;
}

@keyframes shine{
0%{background-position:200% 0}
100%{background-position:-200% 0}
}

</style>
</head>

<body>

<div class="box">

<h2>Copy Script</h2>

<textarea id="script" readonly>
loadstring(game:HttpGet("https://example.com/script.lua"))()
</textarea>

<button class="btn" onclick="copyScript()">Copy Script</button>

<button class="btn" onclick="gotoSite()">Go To Website</button>

</div>

<script>

let token = localStorage.getItem("token")
let expire = localStorage.getItem("expire")

// กันเปิดตรง
if(!token){
window.location.href="index.html"
}

// หมดเวลา
if(Date.now() > expire){
localStorage.removeItem("token")
localStorage.removeItem("expire")
window.location.href="index.html"
}

function copyScript(){

let text = document.getElementById("script")

text.select()
text.setSelectionRange(0,99999)

navigator.clipboard.writeText(text.value)

alert("Script copied!")

}

function gotoSite(){

window.location.href="https://google.com"

}

</script>

</body>
</html>
