<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copy Script</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
background:linear-gradient(135deg,#000,#444,#bbb,#444,#000);
background-size:400% 400%;
animation:bg 12s infinite alternate;
color:white;
}

@keyframes bg{
0%{background-position:0% 50%}
100%{background-position:100% 50%}
}

.card{
width:90%;
max-width:420px;
background:rgba(0,0,0,.6);
padding:35px;
border-radius:15px;
text-align:center;
}

textarea{
width:100%;
height:120px;
border:none;
border-radius:10px;
padding:10px;
margin-bottom:15px;
font-size:14px;
}

button{
width:100%;
padding:15px;
border:none;
border-radius:10px;
font-size:18px;
background:#ff2a2a;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<div class="card">

<h2>Copy Script</h2>

<textarea id="script" readonly>
loadstring(game:HttpGet("https://example.com/script.lua"))()
</textarea>

<button onclick="copy()">📄 Copy Script</button>

</div>

<script>

let params=new URLSearchParams(location.search)

let token=params.get("token")

let saved=sessionStorage.getItem("access")

if(!token || token!==saved){

location.href="index.html"

}

function copy(){

navigator.clipboard.writeText(
document.getElementById("script").value
)

alert("Copied")

sessionStorage.removeItem("access")

}

</script>

</body>
</html>
