<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Your Link</title>

<style>

*{box-sizing:border-box;}

body{
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial, sans-serif;
color:#fff;
overflow:hidden;
text-align:center;

background:
radial-gradient(circle at center,
rgba(255,255,255,0.35) 0%,
rgba(220,220,220,0.25) 25%,
rgba(0,0,0,0.65) 70%,
rgba(0,0,0,0.9) 100%),
linear-gradient(120deg,#0f0f0f,#5a5a5a,#cfcfcf,#5a5a5a,#0f0f0f);

background-size:100% 100%,300% 300%;
animation:bgmove 12s ease infinite;
}

@keyframes bgmove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
width:90%;
max-width:420px;
padding:30px;
background:rgba(0,0,0,0.55);
border-radius:15px;
backdrop-filter:blur(6px);
box-shadow:0 0 25px rgba(0,0,0,0.6);
}

h1{
margin-bottom:10px;
}

p{
opacity:0.8;
margin-bottom:25px;
}

.linkbox{
background:white;
padding:14px;
border-radius:10px;
color:black;
word-break:break-all;
margin-bottom:20px;
}

/* BUTTON */

button{
width:100%;
padding:16px;
font-size:18px;
border:none;
border-radius:12px;
background:linear-gradient(#ff4b4b,#ff0000);
color:white;
cursor:pointer;

transition:all .2s ease;

box-shadow:
0 6px 15px rgba(0,0,0,0.4),
0 0 10px rgba(255,0,0,0.4);
}

button:hover{
transform:translateY(-3px);
box-shadow:
0 12px 25px rgba(0,0,0,0.5),
0 0 20px rgba(255,0,0,0.7);
}

button:active{
transform:scale(.95);
box-shadow:
0 4px 10px rgba(0,0,0,0.5);
}

/* BUBBLE */

.bubble{
position:fixed;
border-radius:50%;
background:rgba(255,255,255,0.15);
animation:float 10s linear infinite;
}

@keyframes float{
0%{transform:translateY(30vh) scale(0.5);opacity:0;}
20%{opacity:1;}
100%{transform:translateY(-20vh) scale(1);opacity:0;}
}

.line{
position:fixed;
width:2px;
height:40px;
background:rgba(255,255,255,0.4);
animation:fall 4s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-50px);opacity:0;}
20%{opacity:1;}
100%{transform:translateY(110vh);opacity:0;}
}

</style>

</head>

<body>

<div class="container">

<h1>🔗 Your Link</h1>

<p>Copy the link below</p>

<div class="linkbox" id="link">
https://example.com
</div>

<button id="copyBtn" onclick="copyLink()">📋 Copy Link</button>

</div>

<script>

let finalLink="https://example.com"

document.getElementById("link").innerText=finalLink

function copyLink(){

navigator.clipboard.writeText(finalLink)

let btn=document.getElementById("copyBtn")

btn.innerText="✅ Copied!"

btn.style.background="linear-gradient(#3cff5c,#00b300)"

setTimeout(()=>{
btn.innerText="📋 Copy Link"
btn.style.background="linear-gradient(#ff4b4b,#ff0000)"
},2000)

}

/* background effects */

function createBubble(){
let b=document.createElement("div")
b.className="bubble"
let size=Math.random()*120+40
b.style.width=size+"px"
b.style.height=size+"px"
b.style.left=Math.random()*100+"%"
document.body.appendChild(b)
setTimeout(()=>b.remove(),10000)
}

setInterval(createBubble,600)

function createLine(){
let l=document.createElement("div")
l.className="line"
l.style.left=Math.random()*100+"%"
document.body.appendChild(l)
setTimeout(()=>l.remove(),4000)
}

setInterval(createLine,600)

</script>

</body>
</html>
