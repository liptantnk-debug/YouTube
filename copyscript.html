<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Your Link</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:Arial;
background:#111;
color:white;
}

.container{
background:#2b2b2b;
padding:30px;
border-radius:15px;
width:320px;
text-align:center;
box-shadow:0 0 30px rgba(0,0,0,0.5);
}

.linkbox{
background:white;
color:black;
padding:12px;
border-radius:8px;
margin:20px 0;
word-break:break-all;
}

button{
position:relative;
overflow:hidden;
width:100%;
padding:16px;
border:none;
border-radius:10px;
font-size:18px;
color:white;
cursor:pointer;

background:linear-gradient(#ff3b3b,#ff0000);

transition:0.2s;

animation:pulse 2s infinite;
}

button:hover{
transform:translateY(-3px);
}

button:active{
transform:scale(.95);
}

/* glow pulse */

@keyframes pulse{
0%{box-shadow:0 0 10px rgba(255,0,0,0.4);}
50%{box-shadow:0 0 25px rgba(255,0,0,0.9);}
100%{box-shadow:0 0 10px rgba(255,0,0,0.4);}
}

/* ripple */

.ripple{
position:absolute;
border-radius:50%;
background:rgba(255,255,255,0.5);
transform:scale(0);
animation:ripple 0.6s linear;
}

@keyframes ripple{
to{
transform:scale(4);
opacity:0;
}
}

/* copied animation */

.copied{
position:absolute;
left:50%;
top:-20px;
transform:translateX(-50%);
color:#00ff6a;
font-size:14px;
opacity:0;
animation:pop 1s forwards;
}

@keyframes pop{
0%{opacity:0;top:-10px;}
50%{opacity:1;}
100%{opacity:0;top:-40px;}
}

</style>
</head>

<body>

<div class="container">

<h2>🔗 Your Link</h2>

<div class="linkbox" id="link">
https://example.com
</div>

<button id="copyBtn">📋 Copy Link</button>

</div>

<script>

let link="https://example.com"

const btn=document.getElementById("copyBtn")

btn.addEventListener("click",function(e){

navigator.clipboard.writeText(link)

/* ripple */

let circle=document.createElement("span")
circle.classList.add("ripple")

circle.style.left=e.offsetX+"px"
circle.style.top=e.offsetY+"px"

btn.appendChild(circle)

setTimeout(()=>circle.remove(),600)

/* copied text */

let msg=document.createElement("div")
msg.className="copied"
msg.innerText="Copied ✓"

btn.appendChild(msg)

setTimeout(()=>msg.remove(),1000)

})

</script>

</body>
</html>
