<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Copy Text</title>

<style>

*{box-sizing:border-box;}

body{
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial,sans-serif;
color:#fff;
overflow:hidden;
text-align:center;

background:
radial-gradient(circle at center,
rgba(255,255,255,0.35) 0%,
rgba(220,220,220,0.25) 25%,
rgba(0,0,0,0.65) 70%,
rgba(0,0,0,0.9) 100%),
linear-gradient(120deg,#0f0f0f,#5a5a5a,#cfcfcf,#5a5a5a,#0f0f0f);

background-size:100% 100%,300% 300%;
animation:bgmove 12s ease infinite;
}

@keyframes bgmove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
width:90%;
max-width:420px;
padding:30px;
background:rgba(0,0,0,0.55);
border-radius:15px;
backdrop-filter:blur(6px);
box-shadow:0 0 25px rgba(0,0,0,0.6);
}

textarea{
width:100%;
height:100px;
border:none;
border-radius:10px;
padding:12px;
resize:none;
font-size:15px;
margin-bottom:20px;
}

/* ปุ่มเหมือนหน้าแรก */

.btn{
display:block;
width:100%;
padding:16px;
font-size:18px;
border:none;
border-radius:12px;

background:linear-gradient(90deg,#ff4b4b,#ff0000,#ff4b4b);
background-size:200% 100%;

color:white;
cursor:pointer;

animation:shine 2s linear infinite;
transition:0.25s;
}

.btn:hover{
transform:scale(1.06);
box-shadow:0 0 25px rgba(255,0,0,0.7);
}

.btn:active{
transform:scale(0.95);
}

@keyframes shine{
0%{background-position:200% 0;}
100%{background-position:-200% 0;}
}

.toast{
position:fixed;
top:-80px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.7);
padding:12px 20px;
border-radius:10px;
transition:0.4s;
}

.toast.show{
top:30px;
}

</style>

</head>

<body>

<div class="container">

<h2>Your Text</h2>

<textarea id="text" readonly>
loadstring(game:HttpGet("https://raw.githubusercontent.com/meobeo8/a/a/a"))()
</textarea>

<button class="btn" id="copyBtn" onclick="copyText()">📄 Copy Text</button>

</div>

<div id="toast" class="toast">Copied</div>

<script>

/* =========================
   SECURITY CHECK SYSTEM
========================= */

let params = new URLSearchParams(location.search)

let token = params.get("token")
let savedToken = sessionStorage.getItem("token")
let expire = sessionStorage.getItem("expire")

/* 1. token ต้องตรง */
if(!token || token !== savedToken){
location.href="index.html"
}

/* 2. หมดเวลา */
if(Date.now() > expire){
location.href="index.html"
}

/* 3. กัน bookmark / refresh */

if(!document.referrer.includes("index")){
location.href="index.html"
}

/* =========================
   COPY
========================= */

function copyText(){

let textarea=document.getElementById("text")
let btn=document.getElementById("copyBtn")

navigator.clipboard.writeText(textarea.value)

btn.innerText="✔ Copied"
btn.style.transform="scale(0.95)"

setTimeout(()=>{
btn.innerText="📄 Copy Text"
btn.style.transform="scale(1)"
},1500)

showToast()

/* token ใช้ครั้งเดียว */

sessionStorage.removeItem("token")
sessionStorage.removeItem("expire")

}

function showToast(){

let toast=document.getElementById("toast")

toast.classList.add("show")

setTimeout(()=>{
toast.classList.remove("show")
},2000)

}

</script>

</body>
</html>
