<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copy Script</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#1b1b1b;
padding:30px;
border-radius:15px;
width:320px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,0.6);
}

textarea{
width:100%;
height:120px;
margin-top:15px;
background:#111;
border:none;
color:#00ff9d;
padding:10px;
border-radius:10px;
resize:none;
font-size:14px;
}

.btn{
display:block;
width:100%;
padding:16px;
font-size:18px;
border:none;
border-radius:12px;
margin-top:15px;

background:linear-gradient(90deg,#ff4b4b,#ff0000,#ff4b4b);
background-size:200% 100%;

color:white;
cursor:pointer;

animation:shine 2s linear infinite;
transition:0.25s;
}

.btn:hover{
transform:scale(1.06);
box-shadow:0 0 25px rgba(255,0,0,0.7);
}

.btn:active{
transform:scale(0.95);
}

@keyframes shine{
0%{background-position:200% 0;}
100%{background-position:-200% 0;}
}

</style>
</head>

<body>

<div class="box">

<h2>Copy Script</h2>

<textarea id="script" readonly>
loadstring(game:HttpGet("https://example.com/script.lua"))()
</textarea>

<button class="btn" onclick="copyText()">Copy Script</button>

<button class="btn" onclick="gotoSite()">Go To Website</button>

</div>

<script>

// กันเปิดตรง
let token = localStorage.getItem("token")
let expire = localStorage.getItem("expire")

if(!token || Date.now() > expire){
alert("Invalid access")
window.location.href="index.html"
}

// copy function
function copyText(){

let text = document.getElementById("script")

text.select()
text.setSelectionRange(0,99999)

navigator.clipboard.writeText(text.value)

alert("Script copied!")

}

// goto site
function gotoSite(){

window.location.href="https://google.com"

}

</script>

</body>
</html>
