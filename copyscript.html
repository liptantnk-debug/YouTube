<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copy Text</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
    font-family:sans-serif;
}

/* card */

.card{
    width:320px;
    background:#1e1e1e;
    padding:25px;
    border-radius:16px;
    box-shadow:0 10px 30px rgba(0,0,0,0.6);
    text-align:center;
}

.title{
    color:white;
    font-size:22px;
    margin-bottom:15px;
}

textarea{
    width:100%;
    height:90px;
    border:none;
    outline:none;
    resize:none;
    padding:12px;
    border-radius:10px;
    font-size:14px;
    box-sizing:border-box;
}

/* button */

button{
    margin-top:15px;
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    font-size:16px;
    color:white;
    cursor:pointer;
    background:linear-gradient(180deg,#ff3c3c,#ff0000);
    transition:0.2s;
    box-shadow:0 0 15px rgba(255,0,0,0.4);
}

button:hover{
    transform:scale(1.05);
    box-shadow:0 0 25px rgba(255,0,0,0.7);
}

/* toast */

.toast{
    position:fixed;
    top:-80px;
    left:50%;
    transform:translateX(-50%);
    background:#1e1e1e;
    color:white;
    padding:14px 25px;
    border-radius:10px;
    box-shadow:0 10px 25px rgba(0,0,0,0.7);
    font-size:14px;
    transition:0.4s;
}

.toast.show{
    top:30px;
}

</style>
</head>

<body>

<div class="card">

<div class="title">🔗 Your Text</div>

<textarea id="text">ใส่ข้อความอะไรก็ได้</textarea>

<button onclick="copyText()">📄 Copy Text</button>

</div>

<div id="toast" class="toast">คัดลอกแล้ว</div>

<script>

function copyText(){

let text = document.getElementById("text").value;

navigator.clipboard.writeText(text).then(() => {

showToast("คัดลอกแล้ว");

});

}

function showToast(msg){

let toast = document.getElementById("toast");

toast.innerText = msg;

toast.classList.add("show");

setTimeout(()=>{
toast.classList.remove("show");
},2000);

}

</script>

</body>
</html>
